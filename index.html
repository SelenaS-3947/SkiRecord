<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Tracker v2.1</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #4da6ff;
            --danger: #ff4d4d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 20px 120px 20px;
        }
        h1 { font-size: 28px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 13px; }
        input {
            width: 100%; padding: 12px; box-sizing: border-box;
            background-color: #2a2a2a; border: 1px solid #333;
            color: white; border-radius: 8px; outline: none;
        }
        input:focus { border-color: var(--accent); }
        
        .row { display: flex; gap: 10px; align-items: flex-end; }
        .divider { text-align: center; color: var(--text-muted); margin: 10px 0; font-size: 12px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #333; }
        .divider::before { left: 0; } .divider::after { right: 0; }

        button.main-btn {
            width: 100%; padding: 14px; background-color: var(--text-main);
            color: var(--bg-color); border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .record-item {
            background-color: var(--card-bg); padding: 15px;
            border-radius: 8px; margin-bottom: 12px; font-size: 14px;
            border-left: 4px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
        }

        .delete-btn {
            background: none; border: 1px solid var(--danger); color: var(--danger);
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
            margin-left: 10px; flex-shrink: 0;
        }

        .summary-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: #1a1a1a; padding: 20px;
            border-top: 1px solid #333;
            display: flex; justify-content: center; gap: 40px;
            z-index: 100;
        }
        .summary-item { text-align: center; }
        .summary-val { display: block; font-size: 20px; font-weight: bold; color: var(--accent); }
        .summary-label { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <h1>Snow Tracks</h1>

    <div class="form-card">
        <div class="form-group">
            <label>日期 (例如: 2025.12.28)</label>
            <input type="text" id="dateInput" placeholder="YYYY.MM.DD">
        </div>
        <div class="form-group">
            <label>雪场名称</label>
            <input type="text" id="fieldInput" placeholder="请输入雪场名">
        </div>

        <div class="row">
            <div class="form-group" style="flex: 1;">
                <label>开始时间 (10.5)</label>
                <input type="number" id="startInput" step="0.5" oninput="clearDuration()">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>结束时间 (15.5)</label>
                <input type="number" id="endInput" step="0.5" oninput="clearDuration()">
            </div>
        </div>

        <div class="divider">或者</div>

        <div class="form-group">
            <label>滑雪时长 (小时)</label>
            <input type="number" id="durationInput" placeholder="直接输入滑了多久" step="0.1" oninput="clearTimes()">
        </div>

        <button class="main-btn" onclick="addRecord()">保存记录</button>
    </div>

    <div id="recordList"></div>

    <div class="summary-box">
        <div class="summary-item">
            <span class="summary-label">总上雪天数</span>
            <span class="summary-val" id="totalDays">0 天</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">总雪时</span>
            <span class="summary-val" id="totalTime">0 个小时</span>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('snowRecordsV3')) || [];

        function clearDuration() { document.getElementById('durationInput').value = ''; }
        function clearTimes() { 
            document.getElementById('startInput').value = ''; 
            document.getElementById('endInput').value = ''; 
        }

        function renderPage() {
            const listDiv = document.getElementById('recordList');
            listDiv.innerHTML = '';
            
            let sumTime = 0;
            let fieldHrMap = {};

            records.forEach((record, index) => {
                sumTime += record.duration;
                // 计算该雪场的累计时长
                fieldHrMap[record.fieldName] = (fieldHrMap[record.fieldName] || 0) + record.duration;

                // 格式化时间段显示
                let timeRange = record.isManual ? "" : (record.startHr + "-" + record.endHr);
                
                // 严格按照你给出的格式拼接字符串
                // dates + " " + startHr + "-" + endHr + " 在" + fieldName + "滑了" + time + "个小时 在该雪场总雪时为" + fieldHr + "小时"
                let report = record.dates + " " + timeRange + " 在" + record.fieldName + "滑了" + record.duration + "个小时 在该雪场总雪时为" + fieldHrMap[record.fieldName] + "小时";
                
                let div = document.createElement('div');
                div.className = 'record-item';
                div.innerHTML = `
                    <span>${report}</span>
                    <button class="delete-btn" onclick="deleteRecord(${index})">删除</button>
                `;
                listDiv.appendChild(div);
            });

            document.getElementById('totalDays').innerText = records.length + " 天";
            document.getElementById('totalTime').innerText = sumTime.toFixed(1) + " 个小时";
        }

        function addRecord() {
            const dateInput = document.getElementById('dateInput');
            const fieldInput = document.getElementById('fieldInput');
            const startInput = document.getElementById('startInput');
            const endInput = document.getElementById('endInput');
            const durationInput = document.getElementById('durationInput');

            const dates = dateInput.value;
            const fieldName = fieldInput.value;
            const startHr = parseFloat(startInput.value);
            const endHr = parseFloat(endInput.value);
            const manualDuration = parseFloat(durationInput.value);

            if(!dates || !fieldName) { alert("请填写日期和雪场名称"); return; }

            let duration = 0;
            let isManual = false;

            if(!isNaN(manualDuration)) {
                duration = manualDuration;
                isManual = true;
            } else if(!isNaN(startHr) && !isNaN(endHr)) {
                if(endHr <= startHr) { alert("结束时间必须大于开始时间"); return; }
                duration = endHr - startHr;
                isManual = false;
            } else {
                alert("请输入滑雪时长或起止时间"); return;
            }

            records.push({ dates, fieldName, startHr, endHr, duration, isManual });
            localStorage.setItem('snowRecordsV3', JSON.stringify(records));
            renderPage();
            
            // --- 修复：保存后清空所有输入框 ---
            dateInput.value = '';
            fieldInput.value = '';
            startInput.value = '';
            endInput.value = '';
            durationInput.value = '';
        }

        function deleteRecord(index) {
            if(confirm("确定要删除这条记录吗？")) {
                records.splice(index, 1);
                localStorage.setItem('snowRecordsV3', JSON.stringify(records));
                renderPage();
            }
        }

        renderPage();
    </script>
</body>
</html>
