<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滑雪记录本Snow Diary</title>
  <style>
    /* 简单样式，让页面在iPad上好看点 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 16px; }
    input, button { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .record-item { border: 1px solid #eee; padding: 12px; margin: 8px 0; border-radius: 8px; }
    .del-btn { background: #ef4444; width: auto; float: right; }
  </style>
</head>
<body>
  <h1> 滑雪记录Ski Records</h1>
  <!-- 输入表单 -->
  <div>
    <input type="date" id="dateInput" placeholder="滑雪日期">
    <input type="text" id="resortInput" placeholder="雪场名称">
    <input type="number" step="0.5" id="hoursInput" placeholder="雪时（小时）">
    <button onclick="addRecord()">添加记录</button>
  </div>

  <h2>历史记录History</h2>
  <div id="recordsList"></div>
  <button onclick="exportData()">导出所有记录为文本</button>
  <button onclick="clearAll()" style="background:#ef4444;margin-top:8px;">清空所有记录</button>

  <script>
    // 从本地存储读已有记录，没有就空数组（类似Java里的new ArrayList<>()）
    function loadRecords() {
      const data = localStorage.getItem('skiRecords');
      return data ? JSON.parse(data) : [];
    }
    // 把记录存回本地存储
    function saveRecords(records) {
      localStorage.setItem('skiRecords', JSON.stringify(records));
    }
    // 添加新记录
    function addRecord() {
      const date = document.getElementById('dateInput').value;
      const resort = document.getElementById('resortInput').value.trim();
      const hours = document.getElementById('hoursInput').value;
      if (!date || !resort || !hours) { alert('请填完所有字段'); return; }
      const records = loadRecords();
      records.push({ date, resort, hours });
      saveRecords(records);
      // 清空输入框
      document.getElementById('dateInput').value = '';
      document.getElementById('resortInput').value = '';
      document.getElementById('hoursInput').value = '';
      renderList();
    }
    // 删除某条记录
    function deleteRecord(idx) {
      const records = loadRecords();
      records.splice(idx, 1);
      saveRecords(records);
      renderList();
    }
    // 渲染列表到页面
    function renderList() {
      const list = document.getElementById('recordsList');
      const records = loadRecords();
      if (records.length === 0) { list.innerHTML = '<p>还没有记录，快填第一条吧~</p>'; return; }
      list.innerHTML = records.map((r, i) => `
        <div class="record-item">
          <button class="del-btn" onclick="deleteRecord(${i})">删除</button>
          <p>日期：${r.date}</p>
          <p>雪场：${r.resort}</p>
          <p>雪时：${r.hours}小时</p>
        </div>
      `).join('');
    }
    // 导出所有记录为可复制文本
    function exportData() {
      const records = loadRecords();
      if (records.length === 0) { alert('没有记录可导出'); return; }
      const text = records.map(r => `${r.date} | ${r.resort} | ${r.hours}小时`).join('\n');
      alert('复制下面内容保存即可：\n' + text);
    }
    // 清空所有
    function clearAll() {
      if (confirm('确定要清空所有记录吗？')) {
        localStorage.removeItem('skiRecords');
        renderList();
      }
    }
    // 页面加载时先渲染一次列表
    renderList();
  </script>
</body>
</html>
